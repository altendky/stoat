name: Rust

on:
  workflow_call:

jobs:
  library:
    name: Generate library
    uses: ./.github/workflows/reflow-library.yml

  resolve-versions:
    name: Resolve Rust versions
    runs-on: ubuntu-latest
    outputs:
      msrv: ${{ steps.resolve.outputs.msrv }}
      stable: ${{ steps.resolve.outputs.stable }}
      beta: ${{ steps.resolve.outputs.beta }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve versions
        id: resolve
        uses: ./.github/actions/resolve-rust-versions
        with:
          msrv: "1.89"

  # Lint job runs separately (doesn't need build/test split)
  lint:
    name: Lint
    needs: [library, resolve-versions]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4
        env:
          RUSTUP_TOOLCHAIN: stable

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ needs.resolve-versions.outputs.stable }}
          components: rustfmt, clippy

      - name: Verify Rust version
        run: |
          echo "=== Rust version verification ==="
          rustc --version
          echo "================================="

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check dependencies
        run: cargo deny check

  # Build job: builds and archives tests
  # Linux builds target musl for static linking (Rust provides built-in support)
  build:
    name: "\U0001F528 ${{ matrix.os.emoji }} ${{ matrix.arch.emoji }} ${{ matrix.rust.emoji }} ${{ matrix.os.name }} ${{ matrix.arch.name }} ${{ matrix.rust.name }}"
    needs: [library, resolve-versions]
    runs-on: ${{ matrix.os.runs-on[matrix.arch.matrix] }}
    continue-on-error: ${{ matrix.rust.matrix == 'beta' }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.library.outputs.matrix).axes.os }}
        arch: ${{ fromJSON(needs.library.outputs.matrix).axes.arch }}
        rust: ${{ fromJSON(needs.library.outputs.matrix).axes.rust }}
        exclude: ${{ fromJSON(needs.library.outputs.matrix).exclude.windows-arm }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4
        env:
          RUSTUP_TOOLCHAIN: stable

      # Determine the Rust version to use
      - name: Determine Rust version
        id: rust-version
        shell: bash
        run: |
          case "${{ matrix.rust.matrix }}" in
            msrv) echo "version=${{ needs.resolve-versions.outputs.msrv }}" >> "$GITHUB_OUTPUT" ;;
            stable) echo "version=${{ needs.resolve-versions.outputs.stable }}" >> "$GITHUB_OUTPUT" ;;
            beta) echo "version=${{ needs.resolve-versions.outputs.beta }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}

      # Linux: Add musl target for static linking
      - name: Add musl target (Linux)
        if: matrix.os.matrix == 'linux'
        run: rustup target add ${{ matrix.arch.matrix == 'arm' && 'aarch64' || 'x86_64' }}-unknown-linux-musl

      # Linux: Install musl C toolchain (needed by crates like ring that compile C code)
      - name: Install musl-tools (Linux)
        if: matrix.os.matrix == 'linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Verify Rust version
        run: |
          echo "=== Rust version verification ==="
          rustc --version
          echo "================================="

      # Linux: Build and archive tests with musl target for static linking
      - name: Build and archive tests (Linux)
        if: matrix.os.matrix == 'linux'
        run: |
          TARGET="${{ matrix.arch.matrix == 'arm' && 'aarch64' || 'x86_64' }}-unknown-linux-musl"
          cargo nextest archive --target "$TARGET" --all-features --archive-file target/nextest-archive.tar.zst

      # Linux: Verify binaries are statically linked
      - name: Verify static linking (Linux)
        if: matrix.os.matrix == 'linux'
        run: .github/scripts/verify-static-linking.sh

      # Non-Linux: Native build
      - name: Build and archive tests
        if: matrix.os.matrix != 'linux'
        run: cargo nextest archive --all-features --archive-file target/nextest-archive.tar.zst

      - name: Upload test archive
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: nextest-archive-${{ matrix.os.matrix }}-${{ matrix.arch.matrix }}-${{ matrix.rust.matrix }}
          path: target/nextest-archive.tar.zst
          retention-days: 1

  # Test job: runs archived tests in different environments
  # Linux tests run in both glibc (Ubuntu) and musl (Alpine) environments
  test:
    name: "\U0001F9EA ${{ matrix.os.emoji }} ${{ matrix.arch.emoji }} ${{ matrix.rust.emoji }} ${{ matrix.libc.emoji }} ${{ matrix.os.name }} ${{ matrix.arch.name }} ${{ matrix.rust.name }} ${{ matrix.libc.name }}"
    needs: [library, resolve-versions, build]
    runs-on: ${{ matrix.os.runs-on[matrix.arch.matrix] }}
    continue-on-error: ${{ matrix.rust.matrix == 'beta' }}
    env:
      MERGIFY_TOKEN_AVAILABLE: ${{ secrets.MERGIFY_TOKEN != '' }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.library.outputs.matrix).axes.os }}
        arch: ${{ fromJSON(needs.library.outputs.matrix).axes.arch }}
        rust: ${{ fromJSON(needs.library.outputs.matrix).axes.rust }}
        libc: ${{ fromJSON(needs.library.outputs.matrix).axes.libc }}
        exclude: ${{ fromJSON(needs.library.outputs.matrix).exclude.test }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download test archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nextest-archive-${{ matrix.os.matrix }}-${{ matrix.arch.matrix }}-${{ matrix.rust.matrix }}

      # Musl: Run tests in Alpine container
      - name: Run tests in Alpine (musl)
        if: matrix.libc.matrix == 'musl'
        uses: docker://alpine:latest
        with:
          entrypoint: /bin/sh
          args: .github/scripts/alpine-test.sh

      # Non-musl: Install nextest via mise and run tests
      - name: Setup mise
        if: matrix.libc.matrix != 'musl'
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4
        env:
          RUSTUP_TOOLCHAIN: stable

      - name: Run tests
        if: matrix.libc.matrix != 'musl'
        run: cargo-nextest nextest run --profile ci --archive-file nextest-archive.tar.zst --workspace-remap .

      - name: Upload test results to Mergify CI Insights
        if: (success() || failure()) && env.MERGIFY_TOKEN_AVAILABLE == 'true'
        uses: mergifyio/gha-mergify-ci@62b45952da6270cad56cce30b8d63276f9d99c88 # v16
        with:
          token: ${{ secrets.MERGIFY_TOKEN }}
          report_path: target/nextest/ci/junit.xml
