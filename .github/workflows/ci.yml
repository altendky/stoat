name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow_ref, github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: true

jobs:
  mise:
    name: Mise
    uses: ./.github/workflows/reflow-mise.yml

  pre-commit:
    name: Pre-commit
    uses: ./.github/workflows/reflow-pre-commit.yml

  rust:
    name: Rust
    uses: ./.github/workflows/reflow-rust.yml
    secrets: inherit

  coverage:
    name: Coverage
    uses: ./.github/workflows/reflow-coverage.yml
    permissions:
      id-token: write

  version:
    name: Version
    uses: ./.github/workflows/reflow-release-version.yml
    with:
      git-tag: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

  build:
    name: Build
    uses: ./.github/workflows/reflow-release-build.yml

  checks:
    name: checks
    if: ${{ !cancelled() }}
    needs: [mise, pre-commit, rust, coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  cargo-publish:
    name: Publish crates
    needs: [version, checks]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: stable

      - name: Validate crate packaging
        run: cargo package --workspace

      - name: Publish all workspace crates
        if: github.ref_type == 'tag'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: .github/scripts/cargo-publish-workspace.sh

  github-release:
    name: GitHub Release
    needs: [version, build, cargo-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate library matrix
        id: library
        uses: ./.github/actions/library

      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: binary-*
          path: binaries

      - name: Package release archives
        shell: bash
        env:
          PLATFORMS: ${{ steps.library.outputs.matrix }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/release

          while read -r entry; do
            name=$(echo "$entry" | jq -r '.name')
            rust_target=$(echo "$entry" | jq -r '.["rust-target"]')
            binary_name=$(echo "$entry" | jq -r '.["binary-name"]')
            archive_format=$(echo "$entry" | jq -r '.["archive-format"]')
            archive_name="stoat-${VERSION}-${rust_target}"

            echo "Packaging ${archive_name}..."

            # Create staging directory with binary and license files
            staging_dir="dist/staging/${archive_name}"
            mkdir -p "$staging_dir"
            cp "binaries/binary-${name}/${binary_name}" "$staging_dir/"
            chmod +x "$staging_dir/${binary_name}"
            cp LICENSE-MIT LICENSE-APACHE "$staging_dir/"

            # Create archive
            if [[ "$archive_format" == "tar.gz" ]]; then
              tar -czf "dist/release/${archive_name}.tar.gz" -C dist/staging "$archive_name"
            elif [[ "$archive_format" == "zip" ]]; then
              (cd dist/staging && zip -r "../release/${archive_name}.zip" "$archive_name")
            else
              echo "ERROR: Unknown archive format '${archive_format}' for ${rust_target}" >&2
              exit 1
            fi
          done < <(echo "$PLATFORMS" | jq -c '.release[]')

          echo "Release archives:"
          ls -la dist/release/

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          truncate -s 0 dist/SHA256SUMS

          for f in dist/release/*; do
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            name=$(basename "$f")
            echo "$hash  $name" >> dist/SHA256SUMS
          done

          echo "SHA256SUMS:"
          cat dist/SHA256SUMS

          if [[ ! -s dist/SHA256SUMS ]]; then
            echo "ERROR: SHA256SUMS is empty — no release archives found" >&2
            exit 1
          fi

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          # Collect all release assets
          assets=()
          for f in dist/release/*; do
            assets+=("$f")
          done
          assets+=("dist/SHA256SUMS")

          echo "Creating release ${TAG} with ${#assets[@]} assets..."
          gh release create "$TAG" \
            --title "v${VERSION}" \
            --generate-notes \
            "${assets[@]}"

  all:
    name: all
    if: ${{ !cancelled() }}
    needs: [checks, cargo-publish, github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
