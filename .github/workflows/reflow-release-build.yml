name: Release Build

on:
  workflow_call:

jobs:
  library:
    name: Generate library
    uses: ./.github/workflows/reflow-library.yml

  build:
    name: "Build (${{ matrix.platform.name }})"
    needs: [library]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(needs.library.outputs.matrix).release }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.platform.rust-target }}

      # Linux: Install musl C toolchain (needed by crates like ring that compile C code)
      - name: Install musl-tools (Linux)
        if: contains(matrix.platform.rust-target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.platform.rust-target }}

      - name: Verify static linking (Linux)
        if: contains(matrix.platform.rust-target, 'linux-musl')
        shell: bash
        run: |
          binary="target/${{ matrix.platform.rust-target }}/release/${{ matrix.platform.binary-name }}"
          echo "Checking: $binary"
          file "$binary"
          if file "$binary" | grep -qE 'statically linked|static-pie linked'; then
            echo "OK: Binary is statically linked"
          else
            echo "ERROR: Binary is dynamically linked" >&2
            exit 1
          fi

      - name: Smoke test binary
        shell: bash
        run: |
          binary="target/${{ matrix.platform.rust-target }}/release/${{ matrix.platform.binary-name }}"
          echo "Running: $binary --version"
          "$binary" --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: binary-${{ matrix.platform.name }}
          path: target/${{ matrix.platform.rust-target }}/release/${{ matrix.platform.binary-name }}
          retention-days: 3
