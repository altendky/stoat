axes:
  os:
    - name: Linux
      matrix: linux
      emoji: "\U0001F427"
      runs-on:
        arm: ubuntu-24.04-arm
        intel: ubuntu-latest
    - name: macOS
      matrix: macos
      emoji: "\U0001F34E"
      runs-on:
        arm: macos-latest
        intel: macos-15-intel
    - name: Windows
      matrix: windows
      emoji: "\U0001FAA7"
      runs-on:
        arm: windows-11-arm
        intel: windows-latest
  arch:
    - name: ARM
      matrix: arm
      emoji: "\U0001F4AA"
    - name: Intel
      matrix: intel
      emoji: "\U0001F300"
  rust:
    - name: MSRV
      matrix: msrv
      version: "1.89"
      emoji: "\u23EC"
    - name: stable
      matrix: stable
      version: stable
      emoji: "\U0001FAA8"
    - name: beta
      matrix: beta
      version: beta
      emoji: "\U0001F52E"
  libc:
    - name: native
      matrix: native
      emoji: "\U0001F3E0"
      # No container - runs directly on runner
    - name: glibc
      matrix: glibc
      emoji: "\U0001F403"
      # Runs on Ubuntu runner (glibc-based), no container needed
    - name: musl
      matrix: musl
      emoji: "\U0001F98C"
      # Uses Docker container action (alpine:latest) in workflow

exclude:
  # For jobs without libc axis (coverage, pre-commit, build)
  windows-arm:
    - os:
        matrix: windows
      arch:
        matrix: arm

  # For test job with libc axis
  test:
    # Windows ARM runners not available
    - os:
        matrix: windows
      arch:
        matrix: arm

    # macOS only uses native (no glibc/musl concept)
    - os:
        matrix: macos
      libc:
        matrix: glibc
    - os:
        matrix: macos
      libc:
        matrix: musl

    # Windows only uses native (no glibc/musl concept)
    - os:
        matrix: windows
      libc:
        matrix: glibc
    - os:
        matrix: windows
      libc:
        matrix: musl

    # Linux excludes native (uses glibc + musl for testing)
    - os:
        matrix: linux
      libc:
        matrix: native

# Release build matrix — explicit list of 5 platform entries.
# Unlike the axes cross-product used for CI, release builds are a flat list
# with platform-specific metadata (Rust target triple, artifact name).
release:
  - name: linux-x64
    runner: ubuntu-latest
    rust-target: x86_64-unknown-linux-musl
    binary-name: stoat
    archive-format: tar.gz
  - name: linux-arm64
    runner: ubuntu-24.04-arm
    rust-target: aarch64-unknown-linux-musl
    binary-name: stoat
    archive-format: tar.gz
  - name: darwin-x64
    runner: macos-15-intel
    rust-target: x86_64-apple-darwin
    binary-name: stoat
    archive-format: tar.gz
  - name: darwin-arm64
    runner: macos-latest
    rust-target: aarch64-apple-darwin
    binary-name: stoat
    archive-format: tar.gz
  - name: win32-x64
    runner: windows-latest
    rust-target: x86_64-pc-windows-msvc
    binary-name: stoat.exe
    archive-format: zip
