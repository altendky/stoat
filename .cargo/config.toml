# Static linking configuration for musl targets
# This ensures Linux binaries are fully portable across distributions
#
# Rust provides built-in musl support with self-contained linking.
# No external linker (Zig, musl-gcc, etc.) is needed - Rust bundles
# everything required for musl targets including libc and CRT files.

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]
