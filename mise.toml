[settings]
# Disable GitHub attestation verification and increase HTTP timeout to eliminate
# flaky CI failures (especially on Windows runners). mise.lock already pins
# SHA256 checksums for integrity.
github_attestations = false
http_timeout = "120s"

[tools]
python = "3"
"pipx:pre-commit" = "4.5.1"
# Non-core tools: use explicit backend prefix (aqua:/github:) for Renovate compatibility
"aqua:taiki-e/cargo-llvm-cov" = "0.8.4"
"aqua:EmbarkStudios/cargo-deny" = "0.19.0"
"github:nextest-rs/nextest" = { version = "0.9.130", version_prefix = "cargo-nextest-" }
# Provides cargo-binstall so the cargo backend can download pre-built binaries
# instead of compiling from source.
cargo-binstall = "latest"
# lychee uses the cargo backend with binstall support so that pre-built binaries
# are downloaded where available.
"cargo:lychee" = "0.23.0"
# mdBook documentation tooling
"aqua:rust-lang/mdBook" = "0.4.52"
"github:badboy/mdbook-mermaid" = "0.16.2"
